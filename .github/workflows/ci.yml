name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test deps
        run: |
          pip install ruff pytest pytest-mock pytest-asyncio pytest-cov
          pip install langchain langchain-core pydantic pydantic-settings \
                      loguru numpy sentence-transformers

      - name: Lint
        run: ruff check src/ tests/

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=src/edadvisor --cov-report=term-missing

  eval-gate:
    name: Ragas Evaluation Gate
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install full deps
        run: pip install -e ".[dev]"

      - name: Run evaluation
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python -m edadvisor.evaluation.runner
        continue-on-error: true
